x-common-config: &common-config
  env_file: .env
  volumes:
    - ./secrets/firebase_serviceAccountKey.json:/run/secrets/firebase_serviceAccountKey.json:ro

services:
  policebot:
    profiles: ["prod"]
    container_name: policebot
    <<: *common-config
    image: ghcr.io/cubeur-manchot/policebot:latest
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - SERVER_ID=329175643877015553
      - MODERATOR_ROLE_ID=332427771286519808
      - PRISONER_ROLE_ID=664224270381219870
  policebot-dev:
    profiles: ["dev"]
    container_name: policebot-dev
    <<: *common-config
    build: .
    stop_grace_period: 3s
    environment:
      - ENVIRONMENT=development
      - SERVER_ID=422718228913979392
      - MODERATOR_ROLE_ID=424959068092891137
      - PRISONER_ROLE_ID=1404943453078687764
